AllChannels:
  get:
    description: List all channels associated with an interconnect.
    operationId: ListChannels
    parameters:
    - $ref: "../parameters/_index.yaml#/parameters/provider"
    - $ref: "../parameters/_index.yaml#/parameters/environment"
    - $ref: "../parameters/_index.yaml#/parameters/interconnect"
    - description: |-
        The maximum number of channels to return. The service may return fewer
        than this value.
      explode: true
      in: query
      name: pageSize
      required: false
      schema:
        format: int32
        type: integer
      style: form
    - description: |-
        A page token, received from a previous `ListChannels` call.
        Provide this to retrieve the subsequent page.

        When paginating, all other parameters provided to `ListChannels` must
        match the call that provided the page token.
      explode: true
      in: query
      name: pageToken
      required: false
      schema:
        type: string
      style: form
    responses:
      default:
        content:
          application/json:
            schema:
              $ref: "../schemas/channel.yaml#/ListChannelsResponse"
        description: Successful operation
    security: []
    tags:
    - Channels
OneChannel:
  get:
    description: Get details about a specific channel.
    operationId: GetChannel
    parameters:
    - $ref: "../parameters/_index.yaml#/parameters/provider"
    - $ref: "../parameters/_index.yaml#/parameters/environment"
    - $ref: "../parameters/_index.yaml#/parameters/interconnect"
    - $ref: "../parameters/_index.yaml#/parameters/channel"
    responses:
      default:
        content:
          application/json:
            schema:
              $ref: "../schemas/channel.yaml#/Channel"
        description: Successful operation
    security: []
    tags:
    - Channels
NotifyMaintenance:
  post:
    description: |-
      Notify a remote provider that maintenance events associated with a channel
      have been modified.

      The receiving provider must refresh the specified channel resource
      immediately after receiving this notification to ensure their local state
      is consistent with the server provider.
    operationId: NotifyMaintenance
    parameters:
    - $ref: "../parameters/_index.yaml#/parameters/provider"
    - $ref: "../parameters/_index.yaml#/parameters/environment"
    - $ref: "../parameters/_index.yaml#/parameters/interconnect"
    - $ref: "../parameters/_index.yaml#/parameters/channel"
    requestBody:
      content:
        application/json:
          schema:
            $ref: "../schemas/channel.yaml#/NotifyMaintenanceRequest"
      description: The request body.
    responses:
      default:
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Empty"
        description: Successful operation
    security: []
    tags:
    - Channels
GetMaintenanceEvents:
  get:
    description: Get all maintenance events associated with a channel.
    operationId: GetMaintenanceEvents
    parameters:
    - $ref: "../parameters/_index.yaml#/parameters/provider"
    - $ref: "../parameters/_index.yaml#/parameters/environment"
    - $ref: "../parameters/_index.yaml#/parameters/interconnect"
    - $ref: "../parameters/_index.yaml#/parameters/channel"
    responses:
      default:
        content:
          application/json:
            schema:
              $ref: "../schemas/channel.yaml#/GetMaintenanceEventsResponse"
        description: Successful operation
    security: []
    tags:
    - Channels
RotateMacSecKey:
  post:
    description: |-
      Notify the channel owner to rotate the MACsec key associated with
      a channel.

      Upon receiving this request, the channel owner must rotate the
      MACsec key at their side and then update the MACsec key on the partner
      side using the MACsec key management APIs.
    operationId: RotateMacSecKey
    parameters:
    - $ref: "../parameters/_index.yaml#/parameters/provider"
    - $ref: "../parameters/_index.yaml#/parameters/environment"
    - $ref: "../parameters/_index.yaml#/parameters/interconnect"
    - $ref: "../parameters/_index.yaml#/parameters/channel"
    requestBody:
      content:
        application/json:
          schema:
            $ref: "../schemas/channel.yaml#/RotateMacSecKeyRequest"
      description: The request body.
    responses:
      default:
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Empty"
        description: Successful operation
    security: []
    tags:
    - Channels
